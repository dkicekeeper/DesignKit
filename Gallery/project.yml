name: Gallery
options:
  bundleIdPrefix: com.designkit
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  DesignKit:
    path: ".."

targets:
  Gallery:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Gallery
    dependencies:
      - package: DesignKit
        product: DesignKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dakacom.DesignKitGallery
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: SY2L2VMQP7
        CODE_SIGN_STYLE: Automatic
